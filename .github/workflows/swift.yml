name: CI-macOS

on:
  push:
    branches:
      - master

jobs:
  build-and-test:
    runs-on: macos-12  # Verwenden Sie macos-12 oder eine neuere Version, um die neueste Xcode-Version zu unterstützen

    timeout-minutes: 8

    steps:
    - uses: actions/checkout@v4

    - name: List repository files
      run: ls -R

    - name: Install Xcode 16 beta
      run: sudo softwareupdate --install-rosetta --agree-to-license
      if: runner.os == 'macOS'
      
    - name: Select Xcode 16 beta
      run: sudo xcode-select -switch /Applications/Xcode_16_beta.app

    - name: Xcode version
      run: /usr/bin/xcodebuild -version
      
    - name: Build and Test
      run: xcodebuild clean build test -project EssentialFeed.xcodeproj -scheme "CI_macOS" CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO -sdk macosx -destination "platform=macOS" ONLY_ACTIVE_ARCH=YES
